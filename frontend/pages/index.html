<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Legali - Indian Criminal Law Search</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#196ee6",
                        "background-light": "#ffffff",
                        "background-dark": "#111821",
                        "text-primary": "#111418",
                        "text-secondary": "#637288",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-text-primary">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <header
            class="sticky top-0 z-50 flex w-full items-center justify-between border-b border-gray-100 bg-white/95 px-6 py-4 backdrop-blur-md dark:border-gray-800 dark:bg-background-dark/95 lg:px-20">
            <div class="flex items-center gap-4">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 text-primary">
                    <span class="material-symbols-outlined" style="font-size: 24px;">balance</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-text-primary dark:text-white">Legali</h2>
            </div>
            <nav class="hidden items-center gap-8 md:flex">
                <a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors"
                    href="index.html">Home</a>
                <a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors" href="#">How It
                    Works</a>
                <a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors"
                    href="acts.html">Acts Covered</a>
                <a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors"
                    href="disclaimer.html">Disclaimer</a>
            </nav>
        </header>

        <main class="flex flex-1 flex-col items-center justify-start px-4 py-8 lg:px-20 min-h-screen">
            <div class="flex w-full max-w-[840px] flex-col gap-8 transition-all duration-500" id="mainContainer">

                <div id="heroSection" class="flex flex-col items-center gap-6 text-center transition-all duration-500">
                    <div
                        class="inline-flex items-center gap-2 rounded-full bg-primary/5 px-3 py-1 text-xs font-semibold uppercase tracking-wider text-primary ring-1 ring-inset ring-primary/20">
                        <span class="material-symbols-outlined text-sm">gavel</span>
                        Updated for New Criminal Laws
                    </div>
                    <h1
                        class="text-4xl font-extrabold leading-tight tracking-tight text-text-primary dark:text-white sm:text-5xl md:text-6xl">
                        Ask Indian Criminal Law.<br />
                        <span class="text-primary">Get Exact Sections.</span>
                    </h1>
                </div>

                <div class="w-full">
                    <div
                        class="group relative flex w-full items-center overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm transition-all focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/10 dark:border-gray-700 dark:bg-gray-800">
                        <div class="flex h-16 w-16 items-center justify-center text-text-secondary">
                            <span class="material-symbols-outlined text-2xl">search</span>
                        </div>
                        <input id="searchInput"
                            class="h-full w-full border-none bg-transparent px-2 py-4 text-lg text-text-primary placeholder-gray-400 focus:ring-0 dark:text-white"
                            placeholder="Describe a situation or ask a question..." type="text" />
                        <div class="pr-2">
                            <button id="searchButton"
                                class="flex h-12 items-center justify-center rounded-lg bg-primary px-6 text-base font-semibold text-white hover:bg-blue-700">
                                Search
                            </button>
                        </div>
                    </div>
                </div>

                <div id="chipsContainer" class="flex flex-col items-center gap-3">
                    <p class="text-sm font-medium text-text-secondary">Try asking:</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <button
                            class="suggested-chip flex items-center gap-2 rounded-lg bg-gray-50 px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-primary/5 hover:text-primary"
                            data-query="Bail procedure under BNSS">Bail procedure under BNSS</button>
                        <button
                            class="suggested-chip flex items-center gap-2 rounded-lg bg-gray-50 px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-primary/5 hover:text-primary"
                            data-query="Theft punishment under BNS">Theft punishment under BNS</button>
                        <button
                            class="suggested-chip flex items-center gap-2 rounded-lg bg-gray-50 px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-primary/5 hover:text-primary"
                            data-query="Evidence admissibility in BSA">Evidence admissibility in BSA</button>
                    </div>
                </div>

                <div id="resultsSection" class="w-full hidden flex-col gap-6">

                    <div
                        class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-gray-800">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-4 dark:border-gray-700 mb-4">
                            <span class="material-symbols-outlined text-primary">auto_awesome</span>
                            <h3 class="font-semibold text-gray-900 dark:text-white">AI Analysis</h3>
                        </div>
                        <div id="answerContent"
                            class="prose prose-slate dark:prose-invert max-w-none text-base leading-7 text-gray-700 dark:text-gray-300">
                        </div>
                    </div>

                    <div id="citationsWrapper" class="hidden flex-col gap-4">
                        <h3 class="font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">menu_book</span>
                            Sources & Citations
                        </h3>
                        <div id="citationsContainer" class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-auto border-t border-gray-100 bg-white py-12 dark:border-gray-800 dark:bg-background-dark">
            <div class="container mx-auto flex flex-col items-center gap-6 px-4 text-center">
                <p class="text-xs text-gray-400">© 2024 Legali Research Systems. All rights reserved.</p>
            </div>
        </footer>
    </div>
    <script src="../app.js"></script>
</body>

</html>
